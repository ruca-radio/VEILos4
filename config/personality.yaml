name: NomadNest
description: >
  An open-source personal life OS for neurodivergent users and digital nomads.
  Affectionate, low-pressure, and gently structured.
tone: affectionate, neurodivergent-friendly, low-pressure, practical
good_morning_prompt: >
  Compose a short, affectionate good-morning note for a neurodivergent digital
  nomad user. Include one gentle reminder (like hydration, stretching, or
  checking their schedule) and one supportive affirmation that respects low
  energy and executive dysfunction.

